# This file serves as a template for the configuration file. Copy it and edit the values as needed.
# Use --config parameter to specify the path to the configuration file.

[client]
# Voter signing key registered in VoterRegistry. 32-byte hex string.
# Example: "0xd49743deccbccc5dc7baa8e69e5be03298da8688a15dd202e20f15d5e0e9a9fb"
signing_private_key = ""
# Sortition key registered in VoterRegistry, used to generate verifiable
# randomness for submission ordering. 32-byte hex string. See keygen/.
sortition_private_key = ""
fast_updater_address = "0x9B931f5d3e24fc8C9064DB35bDc8FB4bE0E862f9"
fast_updates_configuration_address = "0x9A53e14B58383642cdB2bb4D5C46989F05C6B5f9"
submission_address = "0x2cA6571Daa15ce734Bbd0Bf27D5C9D16787fc33f"
mock_address = "0xd4e934C2749CA8C1618659D02E7B28B074bf4df7"
flare_system_manager = "0x85680Dd93755Fe5d0789773fd0896cEE51F9e358"
incentive_manager_address = "0xc1a22A1d295e829Caf3be61bd1E11E5eEd7f0F15"
submission_window = 10
max_weight = 512
value_provider_url = "http://127.0.0.1:3101/feed-values/0"

[transactions]
# Funded EOA private keys used to submit fast-update transactions.
# Multiple accounts let the client submit in parallel for the same
# block window. Each entry is a 32-byte hex string.
# Example:
# accounts = [
#     "0xd49743deccbccc5dc7baa8e69e5be03298da8688a15dd202e20f15d5e0e9a9fb",
#     "0x23c601ae397441f3ef6f1075dcb0031ff17fb079837beadaf3c84d96c6f3e569",
# ]
accounts = []
gas_limit = 2500000
value = 0

# Submissions are EIP-1559 (type 2) transactions. A type-2 fee cap stays valid as
# the base fee rises, so a submission stays includable through a base-fee spike
# within the submission window. submitAndPass is a flare-node prioritised contract
# call (gas above a fixed nominal fee is refunded), so a generous cap costs nothing
# extra; these values are tuned for inclusion robustness, not cost. Fee shaping:
#   gas_tip_cap = clamp(baseFee * max_priority_fee_multiplier, minimal_max_priority_fee, maximal_max_priority_fee)
#   gas_fee_cap = baseFee * base_fee_multiplier + gas_tip_cap
# Values below match the flare-system-client deployment recommendation.
# Defaults applied when unset/<=0: base_fee_multiplier = 4, max_priority_fee_multiplier = 2,
# minimal_max_priority_fee = 100 Gwei, maximal_max_priority_fee = 5000 Gwei.
base_fee_multiplier = 4
max_priority_fee_multiplier = 2
minimal_max_priority_fee = 100_000_000_000  # 100 Gwei
maximal_max_priority_fee = 5000_000_000_000 # 5000 Gwei


[logger]
level = "INFO"
file = "./logger/logs/fast_updates_client.log"
console = true

[chain]
node_url = "https://coston-api.flare.network/ext/bc/C/rpc"
chain_id = 16
